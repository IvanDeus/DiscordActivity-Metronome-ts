<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metronome</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

  <div id="loader">Loading...</div>

  <script>
    window.DISCORD_CLIENT_ID = "{{ client_id }}";
  </script>
  <script type="module" src="/static/js/main.js?v=8"></script>
  
  <div id="app" style="display: none;">
    <div style="height: 40px;"></div>
    <div id="profile-pic" style="background-image: url('');"></div>
    <div class="credits" id="profile-name">[ ivan deus ]</div>

    <div class="container">
      <div class="bpm-control">
       <div class="bpm-level" id="speed-in-bpm"></div>
      </div>

      <div class="controls">
        <button class="control-start" id="playmetr">Start Metronome</button>
      </div>

      <div class="controls">
        <button class="control-btn" id="tempo-down">Slower</button>
        <div class="status" id="bpm-display">BPM: ---</div>
        <button class="control-btn" id="tempo-up">Faster</button>
      </div>
      <br> <br>
    </div>
  </div>
</body>
</html>
